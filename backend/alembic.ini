# A generic Alembic configuration file.
#
# Additional configuration options can be found at:
# https://alembic.sqlalchemy.org/en/latest/config.html

[alembic]
# This is the most important setting.
# It tells Alembic where to find your database URL.
# We are telling it to get the URL from the OS environment variable
# named 'DATABASE_URL', which our .env file provides.
#
# NOTE: We use ${...} syntax for environment variables.
sqlalchemy.url = 

# Path to your Alembic script directory.
script_location = alembic

# Comma-separated list of package names to scan for models.
# This is an alternative to setting target_metadata in env.py
# but we will use the env.py method.
# model_package_names =

# File template for new migration scripts.
file_template = %%(rev)s_%%(slug)s

# Revision file numbering scheme
revision_environment = false

# Set to true to output logging to stderr
log_to_stderr = false


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

